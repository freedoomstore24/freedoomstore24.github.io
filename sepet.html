<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepetim | FREEDOM</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

    <style>
        .cart-page{
            padding: 7rem 0 4rem;
            min-height: 100vh;
            background: #f8f8f8;
        }

        .cart-wrapper{
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .cart-title{
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #111;
        }

        .cart-grid{
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .cart-products,
        .cart-summary{
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,.06);
        }

        .cart-product{
            display: grid;
            grid-template-columns: 90px 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-product:last-child{
            border-bottom: none;
        }

        .cart-product img{
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            background: #f3f3f3;
        }

        .cart-product-name{
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: .35rem;
            color: #111;
        }

        .cart-product-detail{
            font-size: .9rem;
            color: #666;
            margin-bottom: .2rem;
        }

        .cart-product-price{
            font-size: 1rem;
            font-weight: 700;
            color: #111;
        }

        .cart-remove-btn{
            border: none;
            background: #111;
            color: #fff;
            padding: .7rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .cart-summary h2{
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .cart-summary-row,
        .cart-summary-total{
            display: flex;
            justify-content: space-between;
            margin-bottom: .9rem;
        }

        .cart-summary-total{
            margin-top: 1.2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 1.15rem;
            font-weight: 700;
            color: #111;
        }

        .cart-note{
            font-size: .92rem;
            color: #666;
            line-height: 1.6;
            margin: 1rem 0 1.25rem;
        }

        .cart-instagram{
            width: 100%;
            text-align: center;
        }

        .cart-back{
            display: inline-block;
            margin-top: 1rem;
            font-size: .95rem;
            color: #555;
        }

        @media screen and (max-width: 768px){
            .cart-grid{
                grid-template-columns: 1fr;
            }

            .cart-product{
                grid-template-columns: 1fr;
                text-align: left;
            }

            .cart-product img{
                width: 80px;
                height: 80px;
            }

            .cart-title{
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<header class="l-header">
    <nav class="nav bd-grid">
        <div>
            <a href="index.html" class="nav__logo">
                <img src="img/logo.png" alt="FREEDOM Logo" class="logo-img" width="45">
                <span>FREEDOM</span>
            </a>
        </div>

        <div class="nav__menu">
            <ul class="nav__list">
                <li class="nav__item"><a href="index.html#featured" class="nav__link">Ürünler</a></li>
                <li class="nav__item"><a href="index.html#new" class="nav__link">Yeni Sezon</a></li>
                <li class="nav__item"><a href="index.html#iletisim" class="nav__link">İletişim</a></li>
            </ul>
        </div>

        <div>
            <a href="sepet.html" class="nav__cart">
                <i class='bx bx-cart'></i>
            </a>
        </div>
    </nav>
</header>

<main class="cart-page">
    <div class="cart-wrapper">
        <h1 class="cart-title">Sepetim</h1>

        <div class="cart-grid">
            <div class="cart-products">
                <div id="cart-items"></div>
            </div>

            <div class="cart-summary">
                <h2>Sipariş Özeti</h2>

                <div class="cart-summary-row">
                    <span>Ürün Adedi</span>
                    <span id="cart-count">0</span>
                </div>

                <div class="cart-summary-row">
                    <span>Kargo</span>
                    <span>Ücretsiz</span>
                </div>

                <div class="cart-summary-total">
                    <span>Toplam</span>
                    <span id="cart-total">0₺</span>
                </div>

                <p class="cart-note">
                    Sipariş için Instagram hesabımıza ürün adı, beden ve renk bilgisiyle mesaj atabilirsin.
                </p>

                <a href="https://instagram.com/freedoom_store24" target="_blank" class="button cart-instagram">
                    Instagram’dan Sipariş Ver
                </a>

                <a href="index.html" class="cart-back">← Alışverişe geri dön</a>
            </div>
        </div>
    </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
